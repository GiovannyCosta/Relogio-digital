<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Relógio Clássico</title>
</head>

<body>
    <div class="container">
        <!-- Cabeçalho com data -->
        <div class="header">
            <div class="week-wrapper">
                <p class="day"><!--Domingo--></p>
                <p class="date"><!--22 de Outubro de 2023--></p>
            </div>
            <div class="change-lang">
                <select name="idiomas" id="lang-opt">
                    <option value="" selected disabled>Idioma</option>
                    <option value="pt-br">PT-BR</option>
                    <option value="en-US">EN-US</option>
                </select>
            </div>
        </div>

        <!-- Wrapper para o ícone de clima -->
        <div class="weather-wrapper">
            <img id="img" alt="Ícone de clima atual" src="">
        </div>

        <!-- Seção principal com hora e saudação -->
        <div class="section">
            <div class="time-wrapper">
                <h1 class="time"><!--00:00--></h1>
                <p class="greeting"><!----></p>
            </div>
        </div>
    </div>

    <script src="./index.js"></script>
</body>

</html>
